<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>松戸市古ケ崎 ごみ出し通知</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15221c;
      --muted: #5d6d64;
      --line: #d9e2dc;
      --paper: #f7f6f1;
      --panel: #ffffff;
      --green: #1f7a52;
      --green-soft: #e6f3ec;
      --blue: #2563a8;
      --yellow: #f4c542;
      --red: #bd3a3a;
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    p { margin: 0; line-height: 1.7; }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      max-width: 720px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e2c556;
      background: #fff7cf;
      color: #6d5500;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-top: 20px;
    }

    .panel, .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel {
      padding: 18px;
      box-shadow: 0 10px 28px rgba(21, 34, 28, 0.06);
    }

    .today {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .daybox {
      min-height: 166px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcfa;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .garbage-name {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .none {
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .buttonbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button, .linkbutton {
      appearance: none;
      border: 1px solid var(--green);
      background: var(--green);
      color: #fff;
      border-radius: 8px;
      padding: 10px 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
    }

    button.secondary, .linkbutton.secondary {
      background: #fff;
      color: var(--green);
    }

    button.warn {
      border-color: var(--red);
      color: var(--red);
      background: #fff;
    }

    .schedule {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 13px;
      align-items: center;
    }

    .item strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .item span {
      color: var(--muted);
      font-size: 13px;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      vertical-align: -2px;
      margin-right: 7px;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .cell {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 7px;
      overflow: hidden;
    }

    .weekday {
      min-height: auto;
      background: transparent;
      border: 0;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      padding: 2px 0 4px;
    }

    .cell .num {
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .chip {
      display: block;
      border-radius: 999px;
      padding: 3px 7px;
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.2;
      background: var(--green-soft);
      color: #16472f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .official {
      margin-top: 16px;
      padding: 12px;
      background: #eef5fa;
      border: 1px solid #cfe0ed;
      border-radius: 8px;
      color: #284b64;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      header, .grid, .today, .row {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

      .calendar {
        gap: 4px;
      }

      .cell {
        min-height: 72px;
        padding: 5px;
      }

      .chip {
        font-size: 11px;
        padding: 3px 5px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>松戸市古ケ崎 ごみ出し通知</h1>
        <p class="subtitle">住所を毎回調べ直さなくていいように、収集パターンを保存して今日・明日・今月分をすぐ確認できます。</p>
      </div>
      <div class="badge">公式日程は要確認</div>
    </header>

    <section class="grid">
      <div class="panel">
        <h2>今日と明日</h2>
        <div class="today">
          <div class="daybox">
            <div class="date" id="todayDate"></div>
            <div id="todayGarbage"></div>
          </div>
          <div class="daybox">
            <div class="date" id="tomorrowDate"></div>
            <div id="tomorrowGarbage"></div>
          </div>
        </div>
        <div class="buttonbar">
          <button id="notifyBtn">通知を許可</button>
          <button class="secondary" id="testBtn">テスト通知</button>
          <button class="secondary" id="icsBtn">カレンダーを書き出し</button>
          <button class="secondary" id="alexaBtn">Alexa連携JSON</button>
        </div>
        <p class="note" id="notifyNote">ブラウザ通知は、このページを開いている間に確認します。スマホではホーム画面に追加して使うと見やすいです。</p>
      </div>

      <div class="panel">
        <h2>通知設定</h2>
        <div class="controls">
          <label>地域メモ
            <input id="areaInput" value="千葉県松戸市古ケ崎47周辺">
          </label>
          <div class="row">
            <label>前日通知
              <input id="eveningInput" type="time" value="20:00">
            </label>
            <label>当日通知
              <input id="morningInput" type="time" value="07:00">
            </label>
          </div>
          <label>メモ
            <textarea id="memoInput">松戸市の公式ごみ出しカレンダーで地区を確認してから、下の収集ルールを修正してください。</textarea>
          </label>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>今月の予定</h2>
        <div class="calendar" id="calendar"></div>
      </div>

      <div class="panel">
        <h2>収集ルール</h2>
        <div class="controls">
          <label>種類
            <input id="nameInput" placeholder="例: 燃やせるごみ">
          </label>
          <div class="row">
            <label>曜日
              <select id="weekdayInput">
                <option value="1">月</option>
                <option value="2">火</option>
                <option value="3">水</option>
                <option value="4">木</option>
                <option value="5">金</option>
                <option value="6">土</option>
                <option value="0">日</option>
              </select>
            </label>
            <label>週
              <select id="weekInput">
                <option value="every">毎週</option>
                <option value="1">第1</option>
                <option value="2">第2</option>
                <option value="3">第3</option>
                <option value="4">第4</option>
                <option value="5">第5</option>
              </select>
            </label>
          </div>
          <label>出し方メモ
            <input id="descInput" placeholder="例: 朝8時30分まで">
          </label>
          <div class="buttonbar">
            <button id="addBtn">追加</button>
            <button class="warn" id="resetBtn">初期化</button>
          </div>
        </div>
        <div class="schedule" id="scheduleList"></div>
        <div class="official">
          公式確認先: <a href="https://www.city.matsudo.chiba.jp/kurashi/gomi_shinyou/index.html" target="_blank" rel="noreferrer">松戸市 ごみ・リサイクル・し尿</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "matsudo-gomi-notifier-v1";
    const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
    const colors = ["#1f7a52", "#2563a8", "#9b5a1e", "#7b4bb7", "#bd3a3a", "#3f6f75"];

    const defaultState = {
      area: "千葉県松戸市古ケ崎47周辺",
      evening: "20:00",
      morning: "07:00",
      memo: "松戸市の公式ごみ出しカレンダーで地区を確認してから、下の収集ルールを修正してください。",
      rules: [
        { id: crypto.randomUUID(), name: "燃やせるごみ", weekday: 1, week: "every", desc: "仮設定。公式カレンダーで確認してください。", color: colors[0] },
        { id: crypto.randomUUID(), name: "燃やせるごみ", weekday: 4, week: "every", desc: "仮設定。公式カレンダーで確認してください。", color: colors[0] },
        { id: crypto.randomUUID(), name: "リサイクルするプラスチック", weekday: 3, week: "every", desc: "仮設定。公式カレンダーで確認してください。", color: colors[1] },
        { id: crypto.randomUUID(), name: "資源ごみ", weekday: 6, week: "2", desc: "仮設定。公式カレンダーで確認してください。", color: colors[2] }
      ],
      notified: {}
    };

    let state = load();

    const $ = (id) => document.getElementById(id);

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(defaultState);
      try {
        return { ...structuredClone(defaultState), ...JSON.parse(saved) };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function save() {
      state.area = $("areaInput").value.trim();
      state.evening = $("eveningInput").value;
      state.morning = $("morningInput").value;
      state.memo = $("memoInput").value.trim();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function ymd(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日（${dayNames[date.getDay()]}）`;
    }

    function weekOfMonth(date) {
      return Math.floor((date.getDate() - 1) / 7) + 1;
    }

    function matches(rule, date) {
      if (Number(rule.weekday) !== date.getDay()) return false;
      if (rule.week === "every") return true;
      return Number(rule.week) === weekOfMonth(date);
    }

    function eventsFor(date) {
      return state.rules.filter((rule) => matches(rule, date));
    }

    function renderDay(containerId, date) {
      const events = eventsFor(date);
      const el = $(containerId);
      if (!events.length) {
        el.innerHTML = `<div class="none">収集予定なし</div><p class="hint">登録ルール上の表示です。</p>`;
        return;
      }
      el.innerHTML = events.map((event) => `
        <div class="garbage-name"><span class="color-dot" style="background:${event.color}"></span>${escapeHtml(event.name)}</div>
        <p class="hint">${escapeHtml(event.desc || "朝の指定時間までに出してください。")}</p>
      `).join("");
    }

    function renderCalendar() {
      const root = $("calendar");
      const now = new Date();
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      const cells = dayNames.map((d) => `<div class="weekday">${d}</div>`);
      for (let i = 0; i < first.getDay(); i++) cells.push(`<div class="cell"></div>`);
      for (let day = 1; day <= last.getDate(); day++) {
        const date = new Date(now.getFullYear(), now.getMonth(), day);
        const chips = eventsFor(date).map((event) => `<span class="chip" style="background:${tint(event.color)}">${escapeHtml(event.name)}</span>`).join("");
        cells.push(`<div class="cell"><div class="num">${day}</div>${chips}</div>`);
      }
      root.innerHTML = cells.join("");
    }

    function renderRules() {
      const root = $("scheduleList");
      root.innerHTML = state.rules.map((rule) => `
        <div class="item">
          <div>
            <strong><span class="color-dot" style="background:${rule.color}"></span>${escapeHtml(rule.name)}</strong>
            <span>${rule.week === "every" ? "毎週" : `第${rule.week}`} ${dayNames[rule.weekday]}曜 / ${escapeHtml(rule.desc || "")}</span>
          </div>
          <button class="secondary" data-delete="${rule.id}" aria-label="${escapeHtml(rule.name)}を削除">削除</button>
        </div>
      `).join("");
      root.querySelectorAll("[data-delete]").forEach((button) => {
        button.addEventListener("click", () => {
          state.rules = state.rules.filter((rule) => rule.id !== button.dataset.delete);
          save();
          render();
        });
      });
    }

    function render() {
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(today.getDate() + 1);
      $("todayDate").textContent = `今日 ${formatDate(today)}`;
      $("tomorrowDate").textContent = `明日 ${formatDate(tomorrow)}`;
      $("areaInput").value = state.area;
      $("eveningInput").value = state.evening;
      $("morningInput").value = state.morning;
      $("memoInput").value = state.memo;
      renderDay("todayGarbage", today);
      renderDay("tomorrowGarbage", tomorrow);
      renderCalendar();
      renderRules();
    }

    function tint(hex) {
      const value = hex.replace("#", "");
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, 0.14)`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function notify(title, body) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      new Notification(title, { body });
    }

    function checkNotifications() {
      const now = new Date();
      const todayEvents = eventsFor(now);
      const tomorrow = new Date();
      tomorrow.setDate(now.getDate() + 1);
      const tomorrowEvents = eventsFor(tomorrow);
      maybeNotify(now, state.morning, ymd(now), "today", todayEvents, "今日のごみ出し");
      maybeNotify(now, state.evening, ymd(tomorrow), "tomorrow", tomorrowEvents, "明日のごみ出し");
    }

    function maybeNotify(now, hhmm, dateKey, type, events, title) {
      if (!events.length || !hhmm) return;
      const [hh, mm] = hhmm.split(":").map(Number);
      const due = now.getHours() > hh || (now.getHours() === hh && now.getMinutes() >= mm);
      const key = `${dateKey}-${type}`;
      if (due && !state.notified[key]) {
        notify(title, events.map((event) => event.name).join(" / "));
        state.notified[key] = true;
        save();
      }
    }

    function exportIcs() {
      const now = new Date();
      const lines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Matsudo Gomi Notifier//JA"
      ];
      for (let offset = 0; offset < 120; offset++) {
        const date = new Date(now.getFullYear(), now.getMonth(), now.getDate() + offset);
        for (const event of eventsFor(date)) {
          const start = `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}`;
          lines.push("BEGIN:VEVENT");
          lines.push(`UID:${event.id}-${start}@matsudo-gomi`);
          lines.push(`DTSTAMP:${start}T000000Z`);
          lines.push(`DTSTART;VALUE=DATE:${start}`);
          lines.push(`SUMMARY:${escapeIcs(event.name)}`);
          lines.push(`DESCRIPTION:${escapeIcs(`${state.area} ${event.desc || ""}`)}`);
          lines.push("END:VEVENT");
        }
      }
      lines.push("END:VCALENDAR");
      const blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "matsudo-gomi-calendar.ics";
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportAlexaJson() {
      save();
      const payload = {
        version: 1,
        generatedAt: new Date().toISOString(),
        area: state.area,
        notification: {
          evening: state.evening,
          morning: state.morning
        },
        memo: state.memo,
        rules: state.rules.map((rule) => ({
          name: rule.name,
          weekday: Number(rule.weekday),
          week: rule.week,
          desc: rule.desc || ""
        }))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "matsudo-gomi-schedule.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeIcs(value) {
      return String(value).replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;").replace(/\n/g, "\\n");
    }

    ["areaInput", "eveningInput", "morningInput", "memoInput"].forEach((id) => {
      $(id).addEventListener("input", save);
    });

    $("addBtn").addEventListener("click", () => {
      const name = $("nameInput").value.trim();
      if (!name) return;
      state.rules.push({
        id: crypto.randomUUID(),
        name,
        weekday: Number($("weekdayInput").value),
        week: $("weekInput").value,
        desc: $("descInput").value.trim(),
        color: colors[state.rules.length % colors.length]
      });
      $("nameInput").value = "";
      $("descInput").value = "";
      save();
      render();
    });

    $("resetBtn").addEventListener("click", () => {
      if (!confirm("登録したルールを初期状態に戻しますか？")) return;
      state = structuredClone(defaultState);
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    $("notifyBtn").addEventListener("click", async () => {
      if (!("Notification" in window)) {
        $("notifyNote").textContent = "このブラウザは通知に対応していません。";
        return;
      }
      const permission = await Notification.requestPermission();
      $("notifyNote").textContent = permission === "granted" ? "通知を許可しました。" : "通知は許可されませんでした。";
    });

    $("testBtn").addEventListener("click", () => notify("ごみ出し通知テスト", "通知はこのように表示されます。"));
    $("icsBtn").addEventListener("click", exportIcs);
    $("alexaBtn").addEventListener("click", exportAlexaJson);

    render();
    checkNotifications();
    setInterval(checkNotifications, 60 * 1000);
  </script>
</body>
</html>
